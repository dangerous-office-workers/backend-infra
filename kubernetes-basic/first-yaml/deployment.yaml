apiVersion: apps/v1
kind: Deployment  # DeploymentлҘј л§Ңл“ лӢӨ.
metadata:
  name: nginx-deployment
spec:
  replicas: 2   # Pod 2к°ң мң м§Җ
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx  # Pod м•Ҳм—җм„ң nginx м»Ён…Ңмқҙл„ҲлҘј мӢӨн–үн•ҳлқјлҠ” лң»
          ports:
            - containerPort: 80

          readinessProbe:   # nginxмқҳ 80 нҸ¬нҠё '/' кІҪлЎңм—җ HTTP мҡ”мІӯг…ҮлҘҙ ліҙлӮҙ мқ‘лӢө к°ҖлҠҘн•ңм§Җ нҷ•мқён•ңлӢӨ.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3    # м»Ён…Ңмқҙл„Ҳ мӢңмһ‘ нӣ„ 3мҙҲ кё°лӢӨл ёлӢӨк°Җ кІҖмӮ¬лҘј мӢңмһ‘н•ңлӢӨ.
            periodSeconds: 5  # 5мҙҲл§ҲлӢӨ кІҖмӮ¬н•ңлӢӨ.

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

# nginx Pod 2к°ңлҘј мң м§Җн•ҳлҠ” Deployment м„Өм •