apiVersion: apps/v1
kind: Deployment  # Deployment를 만든다.
metadata:
  name: nginx-deployment
#  namespace: study
spec:
  replicas: 2   # Pod 2개 유지

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # 업데이트 중 준비된 Pod 수가 기존 replica보다 줄어드는것을 허용 x
      maxSurge: 1         # 대신 새 Pod를 하나 먼저 추가로 만들 수 있음

  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine  # Pod 안에서 nginx 컨테이너를 실행하라는 뜻
          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:   # nginx의 80 포트 '/' 경로에 HTTP 요청을 보내 응답 가능한지 확인한다.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3    # 컨테이너 시작 후 3초 기다렸다가 검사를 시작한다.
            periodSeconds: 5  # 5초마다 검사한다.

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

# nginx Pod 2개를 유지하는 Deployment 설정